<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="expression" class="expression"></div>
            <div id="result" class="result">0</div>
        </div>
        <div class="buttons">
            <div class="scientific-btns">
                <button class="btn sci" data-action="sin">sin</button>
                <button class="btn sci" data-action="cos">cos</button>
                <button class="btn sci" data-action="tan">tan</button>
                <button class="btn sci" data-action="asin">asin</button>
                <button class="btn sci" data-action="acos">acos</button>
                <button class="btn sci" data-action="atan">atan</button>
                <button class="btn sci" data-action="sqrt">sqrt</button>
                <button class="btn sci" data-action="log">log</button>
                <button class="btn sci" data-action="ln">ln</button>
                <button class="btn sci" data-action="factorial">x!</button>
                <button class="btn sci" data-action="pow">x^y</button>
                <button class="btn sci" data-action="pi">pi</button>
                <button class="btn sci" data-action="e">e</button>
                <button class="btn sci" data-action="abs">|x|</button>
                <button class="btn sci" data-action="floor">floor</button>
                <button class="btn sci" data-action="ceil">ceil</button>
            </div>
            <div class="basic-btns">
                <button class="btn clear" data-action="clear">C</button>
                <button class="btn delete" data-action="delete">DEL</button>
                <button class="btn op" data-value="(">(</button>
                <button class="btn op" data-value=")">)</button>
                <button class="btn num" data-value="7">7</button>
                <button class="btn num" data-value="8">8</button>
                <button class="btn num" data-value="9">9</button>
                <button class="btn op" data-value="/">/</button>
                <button class="btn num" data-value="4">4</button>
                <button class="btn num" data-value="5">5</button>
                <button class="btn num" data-value="6">6</button>
                <button class="btn op" data-value="*">*</button>
                <button class="btn num" data-value="1">1</button>
                <button class="btn num" data-value="2">2</button>
                <button class="btn num" data-value="3">3</button>
                <button class="btn op" data-value="-">-</button>
                <button class="btn num" data-value="0">0</button>
                <button class="btn num" data-value=".">.</button>
                <button class="btn equals" data-action="calculate">=</button>
                <button class="btn op" data-value="+">+</button>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
